[build]
jobs = 10

# Defer PostgreSQL symbol resolution to runtime when building the cdylib
# on macOS. Required by pgrx because the extension links against PG
# symbols that only exist when loaded inside a Postgres backend.
[target.'cfg(target_os="macos")']
rustflags = [
  "-Clink-arg=-fuse-ld=/opt/homebrew/opt/lld/bin/ld64.lld",
  "-Clink-arg=-undefined",
  "-Clink-arg=dynamic_lookup",
]

[alias]
moniker-check = "run -p code-moniker -- check . --profile agent"
