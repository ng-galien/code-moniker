# Project-specific rules overlay. Merged on top of the embedded preset by
# rule id (same id → replace, new id → append).
#
# Workspace layout: `crates/{core,cli,pg}/src/...`. A file at
# `crates/core/src/lang/ts/walker.rs` is scanned from the workspace root
# and encoded as
# `dir:crates/dir:core/dir:src/dir:lang/dir:ts/module:walker`.
# Aliases below pin patterns to that encoding.

[aliases]
# Submodules of the `code_moniker_core` crate. Anchored on `dir:src/dir:<name>`
# so they don't collide with the enclosing crate dir (`dir:crates/dir:core`).
core    = "moniker ~ '**/dir:src/dir:core/**'"
declare = "moniker ~ '**/dir:src/dir:declare/**'"
lang    = "moniker ~ '**/dir:src/dir:lang/**'"
# Standalone crates (each at `crates/<name>/`). The crate dirs are unique
# top-level names, so anchoring on `dir:crates/dir:<name>` is unambiguous.
cli     = "moniker ~ '**/dir:crates/dir:cli/dir:src/**'"
pg      = "moniker ~ '**/dir:crates/dir:pg/dir:src/**'"
ui      = "moniker ~ '**/dir:crates/dir:cli/dir:src/module:ui' OR moniker ~ '**/dir:crates/dir:cli/dir:src/module:ui/**' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/**'"
ui_view           = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/module:view'"
ui_terminal_shell = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:shell/module:terminal'"
ui_panels         = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:panels/**'"
ui_panel_renderer = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:panels/module:mod' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:panels/module:render'"
ui_components     = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:components/**'"
ui_contracts      = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:contracts/**'"
ui_screen_contract     = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:contracts/module:screen'"
ui_msg_owner           = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/module:events' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:app/module:action' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:app/module:state' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:app/module:runtime'"
ui_app_command_boundary = "moniker ~ '**/dir:crates/dir:cli/dir:src/module:ui' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:app/module:mod' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:app/module:state' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:ui/dir:app/module:effect'"
check_expr       = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/module:expr' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/module:expr/**' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/**'"
check_expr_atom   = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:atom' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:atom/**'"
check_expr_domain = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:domain' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:domain/**'"
check_expr_number = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:number' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:number/**'"
check_expr_parse  = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:parse' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:parse/**'"
check_expr_value  = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:value' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:value/**'"
check_expr_collection = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:collection' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:collection/**'"
check_expr_pairs  = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:pairs' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:expr/module:pairs/**'"
check_eval       = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/module:eval' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/module:eval/**' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:eval/**'"
check_eval_local = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:eval/module:local' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:eval/module:local/**'"
check_eval_value = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:eval/module:value' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:eval/module:value/**'"
check_eval_collection = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:eval/module:collection' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:eval/module:collection/**'"
check_eval_metrics = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:eval/module:metrics' OR moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/dir:eval/module:metrics/**'"
check_config     = "moniker ~ '**/dir:crates/dir:cli/dir:src/dir:check/module:config'"
# Per-crate integration tests / examples.
tests             = "moniker ~ '**/dir:tests/**'"
rust_inline_tests = "moniker ~ '**/module:tests/**'"
example           = "moniker ~ '**/dir:examples/**'"

[profiles.architecture]
enable = [".*"]

# ─── Hex / Layering ─────────────────────────────────────────────────
# Cross-crate boundaries (cli → pg, lang → cli) are also enforced by cargo
# via the dependency graph; these rules are defence-in-depth and catch
# accidental adds before they reach a build break.
#
# Intra-crate boundaries (core/ submodule must not import lang/, etc.) are
# NOT enforced by cargo — only by these rules.

[[refs.where]]
id      = "core-no-pgrx"
expr    = "$core AND kind = 'imports_symbol' => NOT target ~ '**/external_pkg:pgrx/**'"
message = "Module `core` is parser-agnostic by contract; pgrx belongs to the `code-moniker-pg` crate."

[[refs.where]]
id      = "core-no-tree-sitter"
expr    = "$core AND kind = 'imports_symbol' => NOT target ~ '**/external_pkg:tree_sitter/**'"
message = "Module `core` is parser-agnostic; tree-sitter belongs under `crates/core/src/lang/`."

[[refs.where]]
id      = "lang-extractors-isolated"
expr    = "$lang AND kind = 'imports_symbol' => NOT target ~ '**/external_pkg:pgrx/**'"
message = "Per-language extractors are pure Rust; pgrx belongs to the `code-moniker-pg` crate."

# Cross-crate refs encode the dependent crate as `external_pkg:<name>` in
# the target moniker. Intra-crate refs use `module:<name>` / `dir:<name>`.
[[refs.where]]
id      = "cli-no-pg"
expr    = "$cli AND kind = 'imports_symbol' => NOT target ~ '**/external_pkg:code_moniker_pg/**'"
message = "`cli` is the standalone binary; importing from `code-moniker-pg` pulls pgrx into the cli build."

[[refs.where]]
id      = "lang-no-cli"
expr    = "$lang AND kind = 'imports_symbol' => NOT target ~ '**/external_pkg:code_moniker_cli/**'"
message = "`lang` extractors are pure libraries consumed by the CLI / PG crates; they must not depend back on the CLI surface."

[[refs.where]]
id      = "ui-store-boundary"
expr    = """
  $ui AND kind = 'imports_symbol'
  => NOT (target ~ '**/path:SessionIndex'
       OR target ~ '**/path:IndexedFile'
       OR target ~ '**/path:CodeGraph'
       OR target ~ '**/path:DefRecord'
       OR target ~ '**/path:RefRecord'
       OR target ~ '**/path:ChangeIndex'
       OR target ~ '**/path:ChangeEntry')
"""
message = "`code-moniker ui` must consume workspace read models; raw graph/index/Git records stay inside `workspace`."

[[refs.where]]
id      = "ui-panels-ratatui-renderers-only"
expr    = """
  $ui_panels AND (kind = 'imports_symbol' OR kind = 'imports_module')
  => ($ui_panel_renderer OR NOT target ~ '**/external_pkg:ratatui/**')
"""
message = "`ui::panels` view models and builders must stay ratatui-free; only panel renderers may import ratatui."

[[refs.where]]
id      = "ui-components-ratatui-free"
expr    = """
  $ui_components AND (kind = 'imports_symbol' OR kind = 'imports_module')
  => NOT target ~ '**/external_pkg:ratatui/**'
"""
message = "`ui::components` own reusable interaction state; ratatui rendering stays in view/panel renderers."

[[refs.where]]
id      = "ui-components-workspace-free"
expr    = """
  $ui_components AND (kind = 'imports_symbol' OR kind = 'imports_module')
  => NOT target ~ '**/dir:workspace/**'
"""
message = "`ui::components` must stay domain-neutral; workspace semantics belong to feature/navigation selectors."

[[refs.where]]
id      = "ui-view-renders-view-models-only"
expr    = """
  $ui_view AND (kind = 'imports_symbol' OR kind = 'imports_module')
  => NOT (target ~ '**/path:App'
       OR target ~ '**/path:ExplorerFeature'
       OR target ~ '**/dir:contracts/**')
"""
message = "`ui::view` renders feature view-models; App/Feature/Screen orchestration belongs outside the renderer."

[[refs.where]]
id      = "ui-terminal-backend-owned-by-shell-terminal"
expr    = """
  $ui AND (kind = 'imports_symbol' OR kind = 'imports_module')
  => ($ui_terminal_shell OR $rust_inline_tests
      OR NOT (target ~ '**/path:CrosstermBackend'
           OR target ~ '**/path:EnterAlternateScreen'
           OR target ~ '**/path:LeaveAlternateScreen'
           OR target ~ '**/path:enable_raw_mode'
           OR target ~ '**/path:disable_raw_mode'))
"""
message = "Terminal backend setup belongs to `ui::shell::terminal`; UI root/app code should not own terminal raw-mode or alternate-screen wiring."

[[refs.where]]
id      = "ui-screen-render-contract-only"
expr    = """
  $ui_screen_contract AND (kind = 'imports_symbol' OR kind = 'imports_module')
  => NOT (target ~ '**/path:Msg'
       OR target ~ '**/path:Effect'
       OR target ~ '**/path:AppCommand'
       OR target ~ '**/module:events/**'
       OR target ~ '**/module:app/**'
       OR target ~ '**/dir:app/**')
"""
message = "`ui::contracts::Screen` is a render-only contract; input messages, effects, and app commands belong to the Elm orchestration layer."

[[refs.where]]
id      = "ui-contracts-do-not-depend-on-app"
expr    = """
  $ui_contracts AND (kind = 'imports_symbol' OR kind = 'imports_module')
  => NOT (target ~ '**/module:app/**' OR target ~ '**/dir:app/**')
"""
message = "`ui::contracts` must stay app-neutral; app commands and effects belong to `ui::app`."

[[refs.where]]
id      = "ui-elm-orchestration-boundary"
expr    = """
  $ui AND kind = 'imports_symbol'
  => (NOT target ~ '**/path:Msg' OR $ui_msg_owner OR $rust_inline_tests)
     AND (NOT target ~ '**/path:AppCommand' OR $ui_app_command_boundary OR $rust_inline_tests)
"""
message = "`Msg` is owned by `ui::events` and reduced in `ui::app`; `AppCommand` is emitted by the reducer and interpreted by the runtime shell."

# Intra-crate: core/ submodule must not depend on its sibling submodules
# (lang/, declare/) nor on the standalone crates.
[[refs.where]]
id      = "core-no-upper"
expr    = """
  $core AND kind = 'imports_symbol'
  => NOT (target ~ '**/dir:lang/**'    OR target ~ '**/module:lang/**'
       OR target ~ '**/dir:declare/**' OR target ~ '**/module:declare/**'
       OR target ~ '**/external_pkg:code_moniker_cli/**'
       OR target ~ '**/external_pkg:code_moniker_pg/**')
"""
message = "`core` is the foundation submodule; it must not depend on `lang`, `declare`, or the standalone crates."

# ─── Check DSL architecture ──────────────────────────────────────────
# Parser code owns syntax and expression shape. Evaluation owns local
# CodeGraph semantics. Config owns TOML/profile/alias loading.

[[refs.where]]
id      = "check-expr-parser-only"
expr    = """
  $check_expr AND kind = 'imports_symbol'
  => NOT (target ~ '**/module:eval/**'
       OR target ~ '**/module:config/**'
       OR target ~ '**/dir:workspace/**')
"""
message = "`check::expr` owns DSL syntax only; evaluation, config loading, and workspace/project indexes stay outside the parser."

[[refs.where]]
id      = "check-eval-local-graph-only"
expr    = """
  $check_eval AND kind = 'imports_symbol'
  => NOT (target ~ '**/dir:workspace/**'
       OR target ~ '**/module:linkage/**'
       OR target ~ '**/path:SessionIndex'
       OR target ~ '**/path:LinkageIndex')
"""
message = "`check::eval` evaluates local `CodeGraph` facts only; project-wide indexes and linkage stay out of the local DSL evaluator."

[[refs.where]]
id      = "check-config-no-runtime-eval"
expr    = """
  $check_config AND kind = 'imports_symbol'
  => NOT (target ~ '**/module:eval/**'
       OR target ~ '**/dir:workspace/**')
"""
message = "`check::config` owns TOML/profile/alias loading; it must not evaluate rules or reach workspace indexes."

[[refs.where]]
id      = "check-expr-parse-no-number-rhs-direct"
expr    = """
  $check_expr_parse AND kind = 'imports_symbol'
  => NOT target ~ '**/dir:check/dir:expr/module:number/path:parse_number_rhs'
"""
message = "`check::expr::parse` still imports `number::parse_number_rhs`; numeric RHS parsing leaks through the boolean parser boundary."

[[refs.where]]
id      = "check-expr-number-no-filter-parser-callback"
expr    = """
  $check_expr_number AND kind = 'method_call'
  => NOT target ~ '**/method:parse_domain_filter_body'
"""
message = "`check::expr::number` still parses `count(...)` filters through the domain/filter parser callback; numeric parsing remains coupled to boolean expression parsing."

[[refs.where]]
id      = "check-expr-specialized-atoms-tail-helper"
expr    = """
  $check_expr_parse
  AND kind = 'method_call'
  AND moniker ~ '**/method:/^try_parse_(segment|number|mode)_atom\\(\\)$/'
  => NOT (target ~ '**/method:eat_op'
       OR target ~ '**/method:find_atom_end')
"""
message = "`check::expr::parse` still repeats comparison-tail parsing in specialized atom parsers; move op/RHS/raw handling behind one helper."

[[refs.where]]
id      = "check-expr-scanners-owned-by-cursor"
expr    = """
  ($check_expr_atom OR $check_expr_domain OR $check_expr_number)
  AND kind = 'method_call'
  => NOT (target ~ '**/method:as_bytes'
       OR target ~ '**/method:is_ascii_digit'
       OR target ~ '**/method:is_ascii_alphabetic'
       OR target ~ '**/method:is_ascii_alphanumeric')
"""
message = "`check::expr` still has local byte/token scanners outside `cursor`; lexical scanning should have a single owner."

# Couche 1 — agrégateurs locaux sur domaine.
# `number` owns numeric syntax, `value` owns domain value expressions used by
# `mode` / `entropy`, and `eval::local` owns the local CodeGraph analytics.

[[refs.where]]
id      = "check-dsl-layer1-mode-body-owned-by-value-parser"
expr    = """
  $check_expr_parse
  AND kind = 'method_call'
  AND moniker ~ '**/method:/^try_parse_mode_atom\\(\\)$/'
  => NOT target ~ '**/method:parse_domain_value_call_body'
"""
message = "`mode(...)` parsing should delegate domain/value body parsing to `check::expr::value`; `parse` only owns boolean precedence and comparison tails."

[[refs.where]]
id      = "check-dsl-layer1-number-parser-stays-numeric"
expr    = """
  $check_expr_number AND kind = 'method_call'
  => NOT target ~ '**/method:parse_mode_lhs'
"""
message = "`check::expr::number` must stay numeric; value-returning aggregators such as `mode` belong to `check::expr::value`."

[[refs.where]]
id      = "check-dsl-layer1-eval-value-is-graph-free"
expr    = """
  $check_eval_value AND kind = 'imports_symbol'
  => NOT (target ~ '**/path:CodeGraph'
       OR target ~ '**/path:DefRecord'
       OR target ~ '**/path:RefRecord'
       OR target ~ '**/dir:workspace/**'
       OR target ~ '**/module:linkage/**')
"""
message = "`check::eval::value` is the typed comparison/rendering layer; local graph traversal belongs to `check::eval::local`."

# Couche 2 — multisets et opérations ensemblistes.
# These rules are intentionally dormant until `collection` modules exist.

[[refs.where]]
id      = "check-dsl-layer2-expr-collection-parser-isolated"
expr    = """
  $check_expr_collection AND kind = 'imports_symbol'
  => NOT (target ~ '**/module:eval/**'
       OR target ~ '**/module:config/**'
       OR target ~ '**/dir:workspace/**')
"""
message = "`check::expr::collection` must remain syntax/AST only; multiset evaluation belongs outside the parser."

[[refs.where]]
id      = "check-dsl-layer2-eval-collection-local-only"
expr    = """
  $check_eval_collection AND kind = 'imports_symbol'
  => NOT (target ~ '**/dir:workspace/**'
       OR target ~ '**/module:linkage/**'
       OR target ~ '**/path:SessionIndex'
       OR target ~ '**/path:LinkageIndex')
"""
message = "`check::eval::collection` must evaluate local multisets only; project-wide linkage stays outside local analysis."

# Couche 3 — itération sur paires.

[[refs.where]]
id      = "check-dsl-layer3-pairs-parser-isolated"
expr    = """
  $check_expr_pairs AND kind = 'imports_symbol'
  => NOT (target ~ '**/module:eval/**'
       OR target ~ '**/module:config/**'
       OR target ~ '**/dir:workspace/**')
"""
message = "`check::expr::pairs` must only parse pair domains/bindings; evaluation and graph traversal stay outside the parser."

# Couche 4 — métriques nommées locales.

[[refs.where]]
id      = "check-dsl-layer4-metrics-local-only"
expr    = """
  $check_eval_metrics AND kind = 'imports_symbol'
  => NOT (target ~ '**/dir:workspace/**'
       OR target ~ '**/module:linkage/**'
       OR target ~ '**/path:SessionIndex'
       OR target ~ '**/path:LinkageIndex')
"""
message = "`check::eval::metrics` must compute named metrics from the local `CodeGraph`; cross-file/project indexes remain out of scope."

# ─── Naming hygiene per layer ────────────────────────────────────────
# These extend / refine the embedded preset that already enforces
# PascalCase / snake_case on the obvious cases.

[[rust.shape.callable.where]]
id      = "max-lines"
expr    = "lines <= 120"
message = "{kind} `{name}` is {value} lines (project cap = {expected}). Split it before its host file approaches the 600-line cap."

[[rust.fn.where]]
id      = "no-placeholder-names"
expr    = "NOT name =~ ^(helper|helpers|do_thing|manage|process)$"
message = "`{name}` is a placeholder. Pick a verb that names the actual behaviour (`extract_*`, `parse_*`, `walk_*`, …)."

[[rust.trait.where]]
id      = "no-i-prefix"
expr    = "NOT name =~ ^I[A-Z]"
message = "Rust trait `{name}` starts with `I` — drop the prefix (`Extractor`, not `IExtractor`)."

# Fixtures under `crates/core/tests/fixtures/` are intentionally arbitrary
# real-code samples used by the snapshot harness; project naming rules
# don't apply to them.
[[ts.function.where]]
id      = "name-camelcase"
expr    = "$tests OR $camel"
message = "Function names use camelCase. Rename `{name}`."

# ─── Comment hygiene ────────────────────────────────────────────────────

[[rust.comment.where]]
id      = "no-nested-comments"
expr    = "$tests OR $rust_inline_tests OR $example OR parent.kind = 'module' OR text =~ '^//\\s*SAFETY:'"
message = "Do not add comments inside functions, methods, structs, enums, traits, or impls. Keep code self-explanatory; only module-boundary and `SAFETY:` comments are allowed."

# Adjacent line/doc-comments are collapsed into one `comment` def by the
# extractor (see `crates/core/src/lang/canonical_walker.rs`), so `lines`
# is the cardinal of a docstring block. Cap to keep doc prose short
# per CLAUDE.md comment sobriety. Exempt module-level `//!` (which
# document modules / formats / contracts) and `SAFETY:` narratives.
[[rust.comment.where]]
id      = "comment-max-lines"
expr    = "$tests OR $rust_inline_tests OR $example OR text =~ '^//\\s*SAFETY:' OR text =~ '^//!' OR lines <= 4"
message = "Doc/block comment is {value} lines (cap = 4). Move prose to docs/ — see CLAUDE.md comment sobriety."

# ─── Walker shape — canonical extractor contract ───────────────────────
# `crates/core/src/lang/canonical_walker.rs` owns the shared extractor walk.
# `walk` iterates children and recurses on `NodeShape::Recurse`; `dispatch`
# applies the same classification to one node and must call `self.walk(...)`
# for recurse cases. Drop-arm `_ => {}` is forbidden — it silently loses
# sub-trees.

[[rust.module.where]]
id      = "walker-struct-exists"
expr    = "moniker ~ '**/dir:lang/module:canonical_walker' => any(struct, name = 'CanonicalWalker')"
message = "`canonical_walker.rs` must define `CanonicalWalker` (state + dispatch methods)."

[[rust.struct.where]]
id      = "walker-has-walk-method"
expr    = "name = 'CanonicalWalker' AND moniker ~ '**/module:canonical_walker/struct:CanonicalWalker' => any(method, name = 'walk')"
message = "CanonicalWalker must expose `walk(node, scope, graph)` — iterates children and recurses on NodeShape::Recurse."

[[rust.struct.where]]
id      = "walker-has-dispatch-method"
expr    = "name = 'CanonicalWalker' AND moniker ~ '**/module:canonical_walker/struct:CanonicalWalker' => any(method, name = 'dispatch')"
message = "CanonicalWalker must expose `dispatch(node, scope, graph)` — single-node classification with recurse fallback."

# Behavioral rule: dispatch must call self.walk for recurse cases.
# Symbolically: dispatch must emit at least one out_ref method_call → walk.
# Whitelist-with-`NodeShape::Recurse => {}` divergence has no such ref and
# trips the rule.
[[rust.method.where]]
id      = "walker-dispatch-recurses-into-walk"
expr    = """
  parent.name = 'CanonicalWalker' AND name = 'dispatch'
  => any(out_refs, kind = 'method_call' AND target.name = 'walk')
"""
message = "CanonicalWalker.dispatch must call `self.walk(...)` for recurse cases. Missing this drops sub-trees."
