name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-unit:
    name: fmt + clippy + cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: rust

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --tests --no-deps -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: daemon RPC schema is up to date
        run: |
          cargo run -p code-moniker-query --features schema --bin export-schema > schema.actual.json
          diff -u docs/schema/daemon.schema.json schema.actual.json

  daemon-schema-types:
    name: generated daemon types up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 20

      - name: Install extension dependencies
        run: npm ci
        working-directory: vscode-extension

      - name: Regenerate daemon types from the committed schema
        run: npm run generate:daemon-types
        working-directory: vscode-extension

      - name: Generated types match the schema
        run: git diff --exit-code vscode-extension/src/daemon/generated.ts

  vscode-extension:
    name: VS Code extension tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: vscode-extension

      - name: Install Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: vscode-extension

      - name: Test and compile the extension
        run: |
          npm test
          npm run compile
        working-directory: vscode-extension

      - name: Run extension integration tests with the bundled CLI
        run: xvfb-run -a npm run test:integration
        working-directory: vscode-extension

      - name: Package and inspect an autonomous Linux VSIX
        run: |
          cargo build --release -p code-moniker --bin code-moniker
          mkdir -p vscode-extension/bin
          cp target/release/code-moniker vscode-extension/bin/code-moniker
          chmod +x vscode-extension/bin/code-moniker
          cd vscode-extension
          npm run package -- --target linux-x64 --out /tmp/code-moniker-linux-x64.vsix
          unzip -Z1 /tmp/code-moniker-linux-x64.vsix | grep -Fx extension/bin/code-moniker

  bench-smoke:
    name: criterion benches compile and run once
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Bench smoke (single iteration, no measurement)
        run: cargo bench -p code-moniker-workspace --benches -- --test

  tui-tests:
    name: tui feature tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Clippy on the tui feature surface
        run: cargo clippy -p code-moniker --features tui,mcp --no-default-features --lib --no-deps -- -D warnings

      - name: Test the tui feature surface
        run: cargo test -p code-moniker --features tui,mcp --no-default-features --lib

  mcp-tests:
    name: mcp feature tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Clippy on the mcp feature surface
        run: cargo clippy -p code-moniker --features mcp --no-default-features --lib --no-deps -- -D warnings

      - name: Test the mcp feature surface
        run: cargo test -p code-moniker --features mcp --no-default-features --lib
