name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-unit:
    name: fmt + clippy + cargo test --lib + pgTAP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install PostgreSQL 17 (server + dev headers + pgTAP)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-server-dev-17 postgresql-17-pgtap

      - name: Make PG17 extension dirs writable for `cargo pgrx install`
        run: |
          sudo chmod a+w /usr/share/postgresql/17/extension/
          sudo chmod a+w "$(/usr/lib/postgresql/17/bin/pg_config --pkglibdir)"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: pgrx-pg17

      - name: Install cargo-pgrx
        uses: taiki-e/install-action@v2.78.0
        with:
          tool: cargo-pgrx@0.18.0

      - name: Initialize pgrx against the apt PG17 install
        run: cargo pgrx init --pg17=/usr/lib/postgresql/17/bin/pg_config

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --features pg17 --no-default-features --tests --no-deps -- -D warnings

      - name: cargo test --lib
        run: cargo test --features pg17 --no-default-features --lib

      - name: pgTAP suite
        env:
          PG_CONFIG: /usr/lib/postgresql/17/bin/pg_config
        run: |
          cargo pgrx start pg17
          cargo pgrx install --pg-config "$PG_CONFIG"
          # pgTAP's .sql lands in the apt-installed extension dir, which
          # the pgrx-managed instance reads via the same pg_config, so
          # CREATE EXTENSION pgtap works out of the box.
          ./pgtap/run.sh

  arch-check:
    name: code-moniker self-lint (dogfood)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: cli

      - name: code-moniker check src/
        run: cargo arch-check
