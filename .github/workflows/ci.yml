name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-unit:
    name: fmt + clippy + cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: rust

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --tests --no-deps -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: daemon RPC schema is up to date
        run: |
          cargo run -p code-moniker-query --features schema --bin export-schema > schema.actual.json
          diff -u docs/schema/daemon.schema.json schema.actual.json

  daemon-schema-types:
    name: generated daemon types up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install extension dependencies
        run: npm ci
        working-directory: vscode-extension

      - name: Regenerate daemon types from the committed schema
        run: npm run generate:daemon-types
        working-directory: vscode-extension

      - name: Generated types match the schema
        run: git diff --exit-code vscode-extension/src/daemon/generated.ts
