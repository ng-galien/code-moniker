name: Extension beta release

on:
  push:
    tags: ['extension-v*.*.*']

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  package-vsix:
    name: package VS Code beta (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
            binary: code-moniker
          - platform: darwin-x64
            runner: macos-15-intel
            binary: code-moniker
          - platform: linux-x64
            runner: ubuntu-latest
            binary: code-moniker
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Verify tag matches extension version
        working-directory: vscode-extension
        run: |
          tag="${GITHUB_REF_NAME#extension-v}"
          version=$(node -p "require('./package.json').version")
          if [ "$tag" != "$version" ]; then
            echo "::error::tag extension-v$tag does not match extension version $version"
            exit 1
          fi

      - name: Build the release CLI
        run: cargo build --release -p code-moniker --bin code-moniker

      - name: Stage the platform CLI in the VSIX
        run: |
          mkdir -p vscode-extension/bin release
          cp target/release/${{ matrix.binary }} vscode-extension/bin/${{ matrix.binary }}
          chmod +x vscode-extension/bin/${{ matrix.binary }}

      - name: Package the platform-specific VSIX
        working-directory: vscode-extension
        run: |
          npm ci
          npm run package -- --target "${{ matrix.platform }}" --out "../release/code-moniker-${GITHUB_REF_NAME#extension-v}-${{ matrix.platform }}.vsix"

      - name: Verify the VSIX contains its CLI
        run: unzip -Z1 release/*.vsix | grep -Fx "extension/bin/${{ matrix.binary }}"

      - name: Write checksums
        working-directory: release
        run: |
          if command -v sha256sum >/dev/null; then
            sha256sum *.vsix > "${{ matrix.platform }}.sha256"
          else
            shasum -a 256 *.vsix > "${{ matrix.platform }}.sha256"
          fi

      - name: Attest the platform VSIX
        uses: actions/attest@v4.1.1
        with:
          subject-path: release/*.vsix

      - name: Upload platform release assets
        uses: actions/upload-artifact@v7.0.1
        with:
          name: extension-release-${{ matrix.platform }}
          path: release/
          if-no-files-found: error
          retention-days: 5

  release-assets:
    name: publish verified VSIX files
    needs: package-vsix
    runs-on: ubuntu-latest
    steps:
      - name: Download platform release assets
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: extension-release-*
          path: release
          merge-multiple: true

      - name: Verify and consolidate checksums
        working-directory: release
        run: |
          find . -name '*.sha256' -print0 | sort -z | xargs -0 cat > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Create or update the GitHub release
        working-directory: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" *.vsix SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" *.vsix SHA256SUMS --title "Code Moniker VS Code beta $GITHUB_REF_NAME" --generate-notes --prerelease
          fi
