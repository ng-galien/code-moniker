name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to resume
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  publish:
    name: publish crates on tag
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: release

      - name: Verify tag matches crates.io package versions
        run: |
          tag="${RELEASE_TAG#v}"
          versions=$(cargo metadata --no-deps --format-version 1 \
                    | jq -r '.packages[]
                      | select(.name == "code-moniker-core" or .name == "code-moniker")
                      | .version' \
                    | sort -u)
          count=$(printf '%s\n' "$versions" | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$count" != "1" ]; then
            echo "::error::crates.io packages do not share one version: $versions"
            exit 1
          fi
          version="$versions"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match crates.io package version $version"
            exit 1
          fi

      - name: Authenticate to crates.io via OIDC
        id: auth
        uses: rust-lang/crates-io-auth-action@v1.0.4

      - name: Publish crates in dependency order
        run: |
          version="${RELEASE_TAG#v}"
          publish_crate() {
            crate="$1"
            if curl --user-agent "code-moniker-release-workflow/${version}" \
              --fail --silent --show-error \
              "https://crates.io/api/v1/crates/${crate}/${version}" >/dev/null; then
              echo "${crate} ${version} is already published"
              return 0
            fi
            for attempt in 1 2 3 4 5; do
              if cargo publish -p "$crate"; then
                return 0
              fi
              echo "${crate} publish failed on attempt ${attempt}; waiting for crates.io index propagation"
              sleep 30
            done
            return 1
          }
          publish_crate code-moniker-core
          publish_crate code-moniker-query
          publish_crate code-moniker-workspace
          publish_crate code-moniker-daemon-client
          publish_crate code-moniker-check
          publish_crate code-moniker-daemon
          publish_crate code-moniker
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  package-cli:
    name: package CLI (${{ matrix.platform }})
    needs: publish
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
            binary: code-moniker
          - platform: darwin-x64
            runner: macos-15-intel
            binary: code-moniker
          - platform: linux-x64
            runner: ubuntu-latest
            binary: code-moniker
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build the release CLI
        run: cargo build --release -p code-moniker --bin code-moniker

      - name: Stage the platform CLI
        run: |
          mkdir -p release/${{ matrix.platform }}
          cp target/release/${{ matrix.binary }} release/${{ matrix.platform }}/${{ matrix.binary }}
          chmod +x release/${{ matrix.platform }}/${{ matrix.binary }}

      - name: Archive the standalone CLI and write checksums
        run: |
          tag="${RELEASE_TAG#v}"
          tar -C "release/${{ matrix.platform }}" -czf "release/code-moniker-${tag}-${{ matrix.platform }}.tar.gz" "${{ matrix.binary }}"
          (
            cd release
            if command -v sha256sum >/dev/null; then
              sha256sum "code-moniker-${tag}-${{ matrix.platform }}.tar.gz" > "${{ matrix.platform }}.sha256"
            else
              shasum -a 256 "code-moniker-${tag}-${{ matrix.platform }}.tar.gz" > "${{ matrix.platform }}.sha256"
            fi
          )

      - name: Attest the standalone CLI
        uses: actions/attest@v4.1.1
        with:
          subject-path: release/*.tar.gz

      - name: Upload platform release assets
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.platform }}
          path: release/
          if-no-files-found: error
          retention-days: 5

  release-assets:
    name: publish verified CLI binaries
    needs: package-cli
    runs-on: ubuntu-latest
    steps:
      - name: Download platform release assets
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Verify and consolidate checksums
        working-directory: release
        run: |
          find . -name '*.sha256' -print0 | sort -z | xargs -0 cat > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Create or update the GitHub release
        working-directory: release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" *.tar.gz SHA256SUMS --clobber
          else
            gh release create "$RELEASE_TAG" *.tar.gz SHA256SUMS --title "Code Moniker $RELEASE_TAG" --generate-notes
          fi
