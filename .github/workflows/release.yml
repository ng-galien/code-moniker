name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: cargo publish on tag
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          crate=$(cargo metadata --no-deps --format-version 1 \
                  | jq -r '.packages[0].version')
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi

      - name: cargo publish (dry-run)
        run: cargo publish --features cli --dry-run

      - name: Authenticate to crates.io via OIDC
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: cargo publish
        run: cargo publish --features cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
