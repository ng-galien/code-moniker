name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: cargo publish on tag
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: release

      - name: Verify tag matches crates.io package versions
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          versions=$(cargo metadata --no-deps --format-version 1 \
                    | jq -r '.packages[]
                      | select(.name == "code-moniker-core" or .name == "code-moniker")
                      | .version' \
                    | sort -u)
          count=$(printf '%s\n' "$versions" | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$count" != "1" ]; then
            echo "::error::crates.io packages do not share one version: $versions"
            exit 1
          fi
          version="$versions"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match crates.io package version $version"
            exit 1
          fi

      - name: Authenticate to crates.io via OIDC
        id: auth
        uses: rust-lang/crates-io-auth-action@v1.0.4

      - name: Publish code-moniker-core
        run: cargo publish -p code-moniker-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish code-moniker
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo publish -p code-moniker; then
              exit 0
            fi
            echo "code-moniker publish failed on attempt ${attempt}; waiting for crates.io index propagation"
            sleep 30
          done
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  package-cli:
    name: package CLI (${{ matrix.platform }})
    needs: publish
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
            binary: code-moniker
          - platform: darwin-x64
            runner: macos-13
            binary: code-moniker
          - platform: linux-x64
            runner: ubuntu-latest
            binary: code-moniker
          - platform: win32-x64
            runner: windows-latest
            binary: code-moniker.exe
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build the release CLI
        run: cargo build --release -p code-moniker --bin code-moniker

      - name: Stage the platform CLI
        run: |
          mkdir -p release/${{ matrix.platform }}
          cp target/release/${{ matrix.binary }} release/${{ matrix.platform }}/${{ matrix.binary }}
          if [ "${{ matrix.platform }}" != "win32-x64" ]; then
            chmod +x release/${{ matrix.platform }}/${{ matrix.binary }}
          fi

      - name: Archive the standalone CLI and write checksums
        run: |
          tag="${GITHUB_REF_NAME#v}"
          tar -C "release/${{ matrix.platform }}" -czf "release/code-moniker-${tag}-${{ matrix.platform }}.tar.gz" "${{ matrix.binary }}"
          (
            cd release
            if command -v sha256sum >/dev/null; then
              sha256sum "code-moniker-${tag}-${{ matrix.platform }}.tar.gz" > "${{ matrix.platform }}.sha256"
            else
              shasum -a 256 "code-moniker-${tag}-${{ matrix.platform }}.tar.gz" > "${{ matrix.platform }}.sha256"
            fi
          )

      - name: Attest the standalone CLI
        uses: actions/attest@v4.1.1
        with:
          subject-path: release/*.tar.gz

      - name: Upload platform release assets
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.platform }}
          path: release/
          if-no-files-found: error
          retention-days: 5

  release-assets:
    name: publish verified CLI binaries
    needs: package-cli
    runs-on: ubuntu-latest
    steps:
      - name: Download platform release assets
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Verify and consolidate checksums
        working-directory: release
        run: |
          find . -name '*.sha256' -print0 | sort -z | xargs -0 cat > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Create or update the GitHub release
        working-directory: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" *.tar.gz SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" *.tar.gz SHA256SUMS --title "Code Moniker $GITHUB_REF_NAME" --generate-notes
          fi
