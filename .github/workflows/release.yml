name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: cargo publish on tag
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: release

      - name: Verify tag matches workspace version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          version=$(cargo metadata --no-deps --format-version 1 \
                    | jq -r '.packages[] | select(.name == "code-moniker-core") | .version')
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match code-moniker-core version $version"
            exit 1
          fi

      - name: Authenticate to crates.io via OIDC
        id: auth
        uses: rust-lang/crates-io-auth-action@v1.0.4

      - name: Publish code-moniker-core
        run: cargo publish -p code-moniker-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish code-moniker
        run: |
          for attempt in 1 2 3 4 5; do
            if cargo publish -p code-moniker; then
              exit 0
            fi
            echo "code-moniker publish failed on attempt ${attempt}; waiting for crates.io index propagation"
            sleep 30
          done
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
