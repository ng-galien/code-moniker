fragment = "workspace-crate"

[aliases]
workspace_crate = "moniker ~ '**/dir:crates/dir:workspace/dir:src/**'"
source_layer = "moniker ~ '**/dir:crates/dir:workspace/dir:src/*:source/**'"
code_layer = "moniker ~ '**/dir:crates/dir:workspace/dir:src/*:code/**'"
linkage_layer = "moniker ~ '**/dir:crates/dir:workspace/dir:src/*:linkage/**'"
linkage_language_domain = "moniker ~ '**/dir:crates/dir:workspace/dir:src/*:linkage/*:language/**'"
linkage_language_private_target = "target ~ '**/dir:crates/dir:workspace/dir:src/*:linkage/*:language/*:/^(java|rust)$/**'"
changes_layer = "moniker ~ '**/dir:crates/dir:workspace/dir:src/*:changes/**'"
snapshot_layer = "moniker ~ '**/dir:crates/dir:workspace/dir:src/*:snapshot/**'"
facade_layer = "moniker ~ '**/dir:crates/dir:workspace/dir:src/module:facade/**'"
test_module = "moniker ~ '**/module:tests/**'"
cli_target = "target ~ '**/external_pkg:code_moniker_cli/**'"
pg_target = "target ~ '**/external_pkg:code_moniker_pg/**'"
compat_or_legacy_name = "moniker ~ '**/*:/^(compat|legacy)$/**'"

[[rust.module.where]]
id       = "workspace-crate-has-no-compat-or-legacy-modules"
severity = "warn"
expr     = "NOT ($workspace_crate AND $compat_or_legacy_name)"
message  = "`code-moniker-workspace` must not contain `compat` or `legacy` modules."
rationale = """
Compatibility and legacy store adaptation belong to CLI. The workspace crate owns reusable
source, code, linkage, changes, snapshot, and facade contracts.
"""

[[refs.where]]
id       = "workspace-crate-does-not-import-cli-or-pg"
severity = "warn"
expr     = "$workspace_crate AND (kind = 'imports_symbol' OR kind = 'imports_module') => NOT ($cli_target OR $pg_target)"
message  = "`code-moniker-workspace` must stay independent from CLI and PG crates."
rationale = """
The crate is intended for CLI/TUI today and MCP later. Importing CLI or PG would make it an
adapter implementation instead of the reusable workspace engine.
"""

[[refs.where]]
id       = "workspace-linkage-language-domains-are-private"
severity = "error"
expr     = """
  $linkage_layer
  AND NOT $linkage_language_domain
  AND (kind = 'imports_symbol' OR kind = 'imports_module' OR kind = 'uses_type' OR kind = 'calls' OR kind = 'method_call' OR kind = 'implements')
  => NOT $linkage_language_private_target
"""
message  = "`workspace::linkage` must consume language-specific linkage through `linkage::language`, not `language::{java,rust}`."
rationale = """
The generic linkage pipeline owns candidate search, manifest policy, query construction,
semantic enhancement, and decision reduction. Java and Rust details are implementation
domains below `linkage::language`; the rest of linkage must depend on the language facade
only. Otherwise language-specific heuristics can leak back into generic orchestration and
recreate the coupling this module split removed.
"""

[[refs.where]]
id       = "workspace-facade-does-not-own-compat-or-check"
severity = "warn"
expr     = """
  $facade_layer
  AND NOT $test_module
  AND (kind = 'imports_symbol' OR kind = 'imports_module')
  => NOT ($cli_target OR $pg_target)
"""
message  = "`workspace::facade` wires workspace ports only; adapters stay outside the crate."
rationale = """
The facade is the extraction boundary used by CLI/TUI and future MCP clients. It should
expose injected workspace services, not depend on concrete adapters outside this crate.
"""
