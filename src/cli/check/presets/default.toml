# code-moniker default rule pack — embedded into the binary at build time.
# Users override per-project via `.code-moniker.toml` at the repo root.
#
# Each `[[<lang>.<kind>.where]]` entry is a single assertion in the form
# `<lhs> <op> <rhs>`. A def violates the rule when the assertion is false.
# Suppress with `// code-moniker: ignore[<lang>.<kind>.<id>]`.
#
# Embedded defaults stick to structural / naming hygiene that is broadly
# uncontroversial. Project-specific policies (comment-content allow-lists,
# doc-comment requirements, max-lines/max-methods budgets) belong in the
# user overlay — see docs/CLI.md for a worked example.

# ─── TypeScript / JavaScript ──────────────────────────────────────────────
[[ts.class.where]]
id      = "name-pascalcase"
expr    = "name =~ ^[A-Z][A-Za-z0-9]*$"
message = "Class names must be PascalCase. Rename `{name}`."

[[ts.interface.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

[[ts.type.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

[[ts.function.where]]
id      = "name-camelcase"
expr    = "name =~ ^[a-z_][A-Za-z0-9]*$"
message = "Function names use camelCase. Rename `{name}`."

[[ts.function.where]]
id      = "no-placeholder-names"
expr    = "name !~ ^(helper|helpers|utils|util|manager|temp|tmp|handleData|processData|newFunction[0-9]*)$"
message = "`{name}` is a placeholder name. Pick a verb that describes the actual behaviour."

# ─── Rust ─────────────────────────────────────────────────────────────────
[[rust.fn.where]]
id   = "name-snakecase"
expr = "name =~ ^[a-z_][a-z0-9_]*$"

[[rust.struct.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

[[rust.trait.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

[[rust.type.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

[[rust.enum.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

[[rust.const.where]]
id   = "name-screaming"
expr = "name =~ ^[A-Z][A-Z0-9_]*$"

# ─── Java ─────────────────────────────────────────────────────────────────
[[java.class.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

[[java.interface.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

[[java.method.where]]
id   = "name-camelcase"
expr = "name =~ ^[a-z_][A-Za-z0-9]*$"

[[java.field.where]]
id   = "name-camelcase"
expr = "name =~ ^[a-z_][A-Za-z0-9]*$"

[[java.enum_constant.where]]
id   = "name-screaming"
expr = "name =~ ^[A-Z][A-Z0-9_]*$"

# ─── Python ───────────────────────────────────────────────────────────────
[[python.function.where]]
id   = "name-snakecase"
expr = "name =~ ^[a-z_][a-z0-9_]*$"

[[python.class.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

[[python.method.where]]
id   = "name-snakecase"
expr = "name =~ ^[a-z_][a-z0-9_]*$"

# ─── Go ───────────────────────────────────────────────────────────────────
[[go.type.where]]
id   = "name-go"
expr = "name =~ ^([A-Z][a-zA-Z0-9_]*|[a-z][a-zA-Z0-9_]*)$"

[[go.const.where]]
id   = "name-go"
expr = "name =~ ^([A-Z][a-zA-Z0-9_]*|[a-z][a-zA-Z0-9_]*)$"

# ─── C# ───────────────────────────────────────────────────────────────────
[[cs.class.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

[[cs.interface.where]]
id   = "name-i-prefix"
expr = "name =~ ^I[A-Z][A-Za-z0-9]*$"

[[cs.record.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

[[cs.method.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

[[cs.property.where]]
id   = "name-pascalcase"
expr = "name =~ ^[A-Z][A-Za-z0-9]*$"

